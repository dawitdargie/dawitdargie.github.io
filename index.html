<!DOCTYPE html>
<html>
<head>
  <title>Dawit Portfolio</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:#0a0a0a; color:white;">

  <div style="
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    background: radial-gradient(circle at top, rgba(235,73,52,0.15), transparent 60%);
  ">

    <!-- Badge -->
    <div style="
      padding:8px 16px;
      border:1px solid #eb4934;
      border-radius:50px;
      color:#eb4934;
      font-size:12px;
      letter-spacing:2px;
      margin-bottom:20px;
    ">
      PORTFOLIO UPDATING
    </div>

    <!-- Main Heading -->
    <h1 style="
      font-size:56px;
      margin:0;
      line-height:1.1;
    ">
      Hello, I'm <span style="color:#eb4934;">Dawit</span>
    </h1>

    <!-- Subtitle -->
    <p style="
      font-size:18px;
      color:#bbbbbb;
      margin-top:15px;
      max-width:500px;
    ">
      My portfolio is currently being redesigned and improved to deliver a better experience.
      <br><br>
      I'm still available for freelance and remote opportunities.
    </p>

    <!-- Buttons -->
    <div style="margin-top:30px; display:flex; gap:15px; flex-wrap:wrap; justify-content:center;">

      <a href="#" style="
        padding:12px 24px;
        background:#eb4934;
        color:white;
        text-decoration:none;
        border-radius:8px;
        font-weight:bold;
        box-shadow:0 10px 30px rgba(235,73,52,0.3);
      ">
        Contact Me
      </a>

    </div>

    <!-- Footer hint -->
    <div style="
      position:absolute;
      bottom:20px;
      font-size:12px;
      color:#555;
    ">
      New portfolio coming soon • Stay tuned
    </div>

  </div>

</body>
</html>
